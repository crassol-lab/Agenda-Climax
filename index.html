<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agenda - Climax Service</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=DM+Mono:wght@500&display=swap" rel="stylesheet">
<style>
:root{--blue:#003b8e;--accent:#0057d9;--gray:#f0f2f7;--white:#fff;--text:#1a1a2e;--muted:#6b7280;--border:#dde2ec;--green:#16a34a;--green-light:#f0fdf4;--green-border:#bbf7d0;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:"DM Sans",sans-serif;background:var(--gray);color:var(--text);padding-bottom:40px;}
header{background:var(--blue);color:white;padding:20px;text-align:center;position:sticky;top:0;z-index:10;box-shadow:0 2px 12px rgba(0,59,142,.25);}
header h1{font-size:20px;font-weight:700;}
.fh{font-family:"DM Mono",monospace;font-size:12px;opacity:.75;margin-top:4px;}
.container{max-width:500px;margin:0 auto;padding:16px;display:flex;flex-direction:column;gap:14px;}
.card{background:var(--white);border-radius:16px;padding:20px;box-shadow:0 2px 12px rgba(0,59,142,.10);border:1px solid var(--border);}
.ct{font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--blue);margin-bottom:14px;display:flex;align-items:center;gap:8px;}
.num{background:var(--blue);color:white;border-radius:50%;width:22px;height:22px;display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0;}
input,textarea,select{width:100%;padding:12px 14px;border:1.5px solid var(--border);border-radius:10px;font-size:15px;font-family:"DM Sans",sans-serif;color:var(--text);background:#fafbff;margin-bottom:10px;appearance:none;-webkit-appearance:none;}
input:focus,textarea:focus,select:focus{outline:none;border-color:var(--accent);background:#fff;}
textarea{resize:vertical;min-height:90px;}
.sw{position:relative;margin-bottom:10px;}
.sw select{margin-bottom:0;}
.sw::after{content:"v";position:absolute;right:14px;top:50%;transform:translateY(-50%);pointer-events:none;color:var(--muted);}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;}
.two-col label{font-size:12px;font-weight:600;color:var(--muted);display:block;margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px;}
.two-col input{margin-bottom:0;}
.checks{display:flex;flex-direction:column;gap:12px;}
.check-item{display:flex;align-items:center;gap:12px;padding:12px 14px;border:1.5px solid var(--border);border-radius:10px;background:#fafbff;cursor:pointer;}
.check-item input[type=checkbox]{width:20px;height:20px;margin:0;accent-color:var(--blue);cursor:pointer;appearance:auto;-webkit-appearance:auto;}
.check-item label{font-size:15px;font-weight:500;cursor:pointer;flex:1;}
.check-item.checked{border-color:var(--accent);background:#f0f4ff;}
.btns{display:flex;flex-direction:column;gap:10px;}
.btn{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:15px;border:none;border-radius:12px;font-size:15px;font-family:"DM Sans",sans-serif;font-weight:700;cursor:pointer;}
.bg{background:#25d366;color:white;}
.br{background:transparent;color:var(--muted);border:1.5px solid var(--border);font-size:14px;padding:12px;}
.footer{text-align:center;font-size:12px;color:var(--muted);margin-top:6px;}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:#1a1a2e;color:white;padding:12px 22px;border-radius:30px;font-size:14px;font-weight:500;z-index:200;transition:transform .3s;white-space:nowrap;}
.toast.show{transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>
<header>
  <img src="logo.png" alt="Climax" style="height:48px;display:block;margin:0 auto 6px;">
  <h1>📅 Agenda - Climax Service</h1>
  <div class="fh" id="fh">-</div>
</header>
<div class="container">
  <div class="card">
    <div class="ct"><span class="num">1</span> ¿Quién carga?</div>
    <div class="sw">
      <select id="cargador">
        <option value="">Seleccionar</option>
        <option>Lionel</option>
        <option>Antonella</option>
        <option>Hector</option>
      </select>
    </div>
  </div>
  <div class="card">
    <div class="ct"><span class="num">2</span> 📅 Fecha y horario</div>
    <div class="two-col">
      <div><label>Fecha</label><input type="date" id="fecha"></div>
      <div></div>
    </div>
    <div class="two-col">
      <div><label>Hora inicio</label><input type="time" id="horaInicio"></div>
      <div><label>Hora fin</label><input type="time" id="horaFin"></div>
    </div>
  </div>
  <div class="card">
    <div class="ct"><span class="num">3</span> 👷 ¿Quién va al trabajo?</div>
    <div class="checks">
      <div class="check-item" id="wrap-lionel" onclick="toggleCheck('lionel','wrap-lionel')">
        <input type="checkbox" id="lionel">
        <label for="lionel">Lionel</label>
      </div>
      <div class="check-item" id="wrap-brian" onclick="toggleCheck('brian','wrap-brian')">
        <input type="checkbox" id="brian">
        <label for="brian">Brian</label>
      </div>
      <div class="check-item" id="wrap-leo" onclick="toggleCheck('leo','wrap-leo')">
        <input type="checkbox" id="leo">
        <label for="leo">Leo</label>
      </div>
    </div>
  </div>
  <div class="card">
    <div class="ct"><span class="num">4</span> 👤 Cliente</div>
    <input id="cliente" placeholder="Nombre del cliente" autocomplete="off">
  </div>
  <div class="card">
    <div class="ct"><span class="num">5</span> 📍 Dirección</div>
    <input id="direccion" placeholder="Calle y número" autocomplete="off">
  </div>
  <div class="card">
    <div class="ct"><span class="num">6</span> 📝 Observaciones</div>
    <textarea id="obs" placeholder="Tipo de trabajo, aclaraciones, etc."></textarea>
  </div>
  <div class="card" style="padding:16px">
    <div class="btns">
      <button class="btn bg" onclick="enviar()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="white"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
        Enviar por WhatsApp
      </button>
      <button class="btn br" onclick="reset()">🔄 Nuevo turno</button>
    </div>
  </div>
  <div class="footer">Uso interno - Climax Service</div>
</div>
<div class="toast" id="toast"></div>
<script>
var yaEnviado = false;
var SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyuuXR1faJI9lWinkVn9COnntzkuIrbHFam8T2EUqmM70xyqUNMHm-2__0-ea-r4b28/exec';

function ini() {
  var a = new Date();
  var d = ["domingo","lunes","martes","miercoles","jueves","viernes","sabado"];
  var mo = ["enero","febrero","marzo","abril","mayo","junio","julio","agosto","septiembre","octubre","noviembre","diciembre"];
  document.getElementById("fh").textContent = d[a.getDay()] + " " + a.getDate() + " de " + mo[a.getMonth()] + " " + a.getFullYear();
  if (!document.getElementById("fecha").value) {
    var h = new Date();
    document.getElementById("fecha").value = h.getFullYear() + "-" + pad(h.getMonth()+1) + "-" + pad(h.getDate());
  }
}
function pad(n) { return String(n).padStart(2,"0"); }
ini();
setInterval(ini, 60000);

function toggleCheck(id, wrapId) {
  var cb = document.getElementById(id);
  cb.checked = !cb.checked;
  document.getElementById(wrapId).classList.toggle("checked", cb.checked);
}

function gf() {
  var v = document.getElementById("fecha").value;
  if (!v) return "";
  var p = v.split("-");
  return p[2] + "/" + p[1] + "/" + p[0];
}

function fmtHora(t) {
  if (!t) return "";
  var p = t.split(":");
  var h = parseInt(p[0]);
  var m = p[1];
  var ap = h >= 12 ? "pm" : "am";
  h = h % 12 || 12;
  return h + ":" + m + ap;
}

function getEmpleados() {
  var r = [];
  if (document.getElementById("lionel").checked) r.push("Lionel");
  if (document.getElementById("brian").checked) r.push("Brian");
  if (document.getElementById("leo").checked) r.push("Leo");
  return r.join(", ");
}

function enviar() {
  var cargador = document.getElementById("cargador").value;
  if (!cargador) { toast("Selecciona quien carga"); return; }
  var cliente = document.getElementById("cliente").value.trim();
  if (!cliente) { toast("Ingresa el nombre del cliente"); return; }
  var fecha = gf();
  if (!fecha) { toast("Selecciona la fecha"); return; }
  if (yaEnviado) { toast("Ya fue enviado. Toca Nuevo turno."); return; }

  var horaInicio = document.getElementById("horaInicio").value;
  var horaFin = document.getElementById("horaFin").value;
  var empleados = getEmpleados();
  var direccion = document.getElementById("direccion").value.trim();
  var obs = document.getElementById("obs").value.trim();

  var m = "*AGENDA - CLIMAX SERVICE*\n";
  m += "Fecha: " + fecha + "\n";
  if (horaInicio) m += "Horario: " + fmtHora(horaInicio) + (horaFin ? " - " + fmtHora(horaFin) : "") + "\n";
  m += "\nCliente: *" + cliente + "*\n";
  if (direccion) m += "Direccion: " + direccion + "\n";
  if (empleados) m += "Empleados: " + empleados + "\n";
  if (obs) m += "\nObservaciones: " + obs + "\n";
  m += "\nCargado por: " + cargador;

  window.open("https://wa.me/?text=" + encodeURIComponent(m), "_blank");

  yaEnviado = true;

  var fila = [
    fecha, horaInicio, horaFin, cliente, direccion, empleados, obs, cargador
  ];

  fetch(SCRIPT_URL, {
    method: 'POST', mode: 'no-cors',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ hoja: 'agenda', fila: fila })
  }).catch(function() {});

  toast("Turno guardado correctamente");
}

function reset() {
  document.getElementById("cargador").value = "";
  document.getElementById("cliente").value = "";
  document.getElementById("direccion").value = "";
  document.getElementById("obs").value = "";
  document.getElementById("horaInicio").value = "";
  document.getElementById("horaFin").value = "";
  ["lionel","brian","leo"].forEach(function(id) {
    document.getElementById(id).checked = false;
    document.getElementById("wrap-"+id).classList.remove("checked");
  });
  yaEnviado = false;
  document.getElementById("fecha").value = "";
  ini();
  toast("Formulario reiniciado");
}

function toast(msg) {
  var t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(function() { t.classList.remove("show"); }, 2500);
}
</script>
</body>
</html>
